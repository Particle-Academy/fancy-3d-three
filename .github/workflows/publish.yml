name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # BOOTSTRAP (first publish): authenticates with the NPM_TOKEN repo secret.
      # npm won't let you configure a Trusted Publisher for a package that
      # doesn't exist yet, so the very first release uses a short-lived token.
      # After it lands, add the Trusted Publisher on npmjs.com and delete the
      # `env: NODE_AUTH_TOKEN` line below — subsequent releases publish via OIDC.
      #
      # Trusted Publishing OIDC needs npm 11.5.1+; the runner bundles npm 10.x,
      # so fetch a fresh npm just for publish.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
