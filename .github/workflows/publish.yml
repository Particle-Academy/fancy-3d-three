name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) — no token. The Trusted Publisher is configured
      # on npmjs.com and the bootstrap NPM_TOKEN has been revoked. OIDC needs npm
      # 11.5+; the runner bundles npm 10, so fetch a fresh npm via npx for publish.
      - name: Publish
        run: npx -y npm@11.18.0 publish --provenance --access public
